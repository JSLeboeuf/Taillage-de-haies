name = "haie-lite-app"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
BASE_URL = "https://haie-lite-app.pages.dev"

# Cron Triggers — reproduit les routes /api/cron/*
[[triggers.crons]]
cron = "0 11 * * *"   # daily-kpi — 7h00 EDT (11h UTC)

[[triggers.crons]]
cron = "0 20 * * *"   # job-confirmation — 16h00 EDT (20h UTC)

[[triggers.crons]]
cron = "0 14 * * *"   # review-request — 10h00 EDT (14h UTC)

[[triggers.crons]]
cron = "0 15 * * 1"   # weekly-employee-report — lundi 11h EDT (15h UTC)

[[triggers.crons]]
cron = "0 13 * * *"   # lead-followup — 9h00 EDT (13h UTC)

[[triggers.crons]]
cron = "0 14 * * *"   # upsell-followup

[[triggers.crons]]
cron = "0 12 * * *"   # weather-alert — 8h00 EDT (12h UTC)

[[triggers.crons]]
cron = "0 21 * * *"   # sync-timesheets — 17h00 EDT (21h UTC)

[[triggers.crons]]
cron = "0 9 1 * *"    # monthly-performance — 1er du mois 5h EDT (9h UTC)

[[triggers.crons]]
cron = "0 13 * * *"   # dormant-reactivation

[[triggers.crons]]
cron = "0 10 * * *"   # daily-payroll — 6h00 EDT (10h UTC)

[[triggers.crons]]
cron = "0 12 * * 0"   # check-google-reviews — dimanche 8h EDT (12h UTC)
