<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Terrain — Haie Lite</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232635;
      --border: #2d3147;
      --green: #22c55e;
      --green-dim: #16a34a;
      --dark-green: #2d6a4f;
      --darker-green: #1b3a37;
      --yellow: #eab308;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #6366f1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(180deg, var(--dark-green) 0%, var(--darker-green) 100%);
      padding: 20px;
      border-bottom: 2px solid var(--green);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .job-counter {
      background: var(--green);
      color: var(--darker-green);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .progress-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green) 0%, var(--accent) 100%);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 4px;
    }

    .progress-text {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .section.completed {
      border-color: var(--green);
      background: rgba(34, 197, 94, 0.05);
    }

    .section-header {
      padding: 16px;
      background: var(--surface2);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .section.completed .section-header {
      background: rgba(34, 197, 94, 0.1);
      border-bottom-color: var(--green);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .emoji {
      font-size: 18px;
    }

    .section-icon {
      font-size: 16px;
      color: var(--muted);
      transition: transform 0.3s ease;
    }

    .section.completed .section-icon {
      color: var(--green);
      transform: rotate(180deg);
    }

    .section.collapsed .section-icon {
      transform: rotate(-90deg);
    }

    .section-content {
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .section.collapsed .section-content {
      max-height: 0;
    }

    .items {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 8px;
      border-radius: 6px;
    }

    .item:hover {
      background: rgba(34, 197, 94, 0.05);
    }

    .item input[type="checkbox"] {
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      cursor: pointer;
      accent-color: var(--green);
      margin-top: 2px;
    }

    .item.checked {
      opacity: 0.6;
    }

    .item.checked .item-label {
      text-decoration: line-through;
      color: var(--muted);
    }

    .item-label {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: pointer;
    }

    .item-label strong {
      font-size: 14px;
      color: var(--text);
      display: block;
    }

    .item-label em {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      display: block;
    }

    .footer {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: var(--surface);
      position: sticky;
      bottom: 0;
    }

    .btn {
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-reset {
      background: var(--red);
      color: white;
    }

    .btn-reset:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-new-job {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dim) 100%);
      color: var(--bg);
      grid-column: span 2;
    }

    .btn-new-job:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    @media (max-width: 600px) {
      .header {
        padding: 16px;
      }

      .header-title {
        font-size: 16px;
      }

      .content {
        padding: 16px;
      }

      .section {
        margin-bottom: 16px;
      }

      .section-header {
        padding: 12px;
      }

      .section-title {
        font-size: 14px;
      }

      .items {
        padding: 12px;
        gap: 10px;
      }

      .item {
        padding: 6px;
      }

      .footer {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .btn-new-job {
        grid-column: span 1;
      }

      .job-counter {
        font-size: 11px;
        padding: 3px 10px;
      }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      animation: slideUp 0.3s ease;
      z-index: 200;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .item input[type="checkbox"]:checked {
      animation: pulse 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="header-title">
        <span>✓ Checklist Terrain</span>
      </div>
      <div class="job-counter">
        <span id="jobCount">0</span> jobs
      </div>
    </div>
    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text">
        <span id="progressText">0/25 étapes</span>
        <span id="progressPercent">0%</span>
      </div>
    </div>
  </div>

  <div class="content">
    <!-- SECTION 1: DÉPART -->
    <div class="section" data-section="depart">
      <div class="section-header">
        <div class="section-title">
          <span class="emoji">🚗</span>
          <span>DÉPART (avant de quitter)</span>
        </div>
        <div class="section-icon">▼</div>
      </div>
      <div class="section-content">
        <div class="items">
          <label class="item">
            <input type="checkbox" class="item-check" data-id="depart-1">
            <div class="item-label">
              <strong>Inspection véhicule</strong>
              <em>Huile, pneus, freins, lumières</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="depart-2">
            <div class="item-label">
              <strong>Équipement chargé</strong>
              <em>Cisailles, souffleur, bâches, râteaux</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="depart-3">
            <div class="item-label">
              <strong>Échelle en bon état + attachée</strong>
              <em>Vérifier fixation et intégrité</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="depart-4">
            <div class="item-label">
              <strong>EPI complet</strong>
              <em>Lunettes, gants, bottes, casque</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="depart-5">
            <div class="item-label">
              <strong>Adresse du job vérifiée</strong>
              <em>Adresse + numéro confirmes sur téléphone</em>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- SECTION 2: ARRIVÉE -->
    <div class="section" data-section="arrivee">
      <div class="section-header">
        <div class="section-title">
          <span class="emoji">📸</span>
          <span>ARRIVÉE SUR SITE</span>
        </div>
        <div class="section-icon">▼</div>
      </div>
      <div class="section-content">
        <div class="items">
          <label class="item">
            <input type="checkbox" class="item-check" data-id="arrivee-1">
            <div class="item-label">
              <strong>Photo AVANT prise et envoyée</strong>
              <em>Qualité haute, bon éclairage, haie complète visible</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="arrivee-2">
            <div class="item-label">
              <strong>Tour avec le client fait</strong>
              <em>Montrer la haie, poser la question clé</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="arrivee-3">
            <div class="item-label">
              <strong>Attentes du client notées</strong>
              <em>Taille courte, longueur, forme (conique, rectangulaire)?</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="arrivee-4">
            <div class="item-label">
              <strong>Fils électriques / obstacles vérifiés</strong>
              <em>Repérer les risques avant de commencer</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="arrivee-5">
            <div class="item-label">
              <strong>Zone de travail sécurisée</strong>
              <em>Cônes, barrière si nécessaire, voie dégagée</em>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- SECTION 3: PENDANT LE TRAVAIL -->
    <div class="section" data-section="travail">
      <div class="section-header">
        <div class="section-title">
          <span class="emoji">✂️</span>
          <span>PENDANT LE TRAVAIL</span>
        </div>
        <div class="section-icon">▼</div>
      </div>
      <div class="section-content">
        <div class="items">
          <label class="item">
            <input type="checkbox" class="item-check" data-id="travail-1">
            <div class="item-label">
              <strong>Taille conique respectée</strong>
              <em>Plus large en bas, plus étroit en haut</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="travail-2">
            <div class="item-label">
              <strong>Uniformité ±2cm vérifiée</strong>
              <em>Pas de grosses variations, ligne nette</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="travail-3">
            <div class="item-label">
              <strong>Résidus ramassés au fur et à mesure</strong>
              <em>Pas d'accumulation, terrain propre en temps réel</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="travail-4">
            <div class="item-label">
              <strong>Pas de fumée sur le chantier</strong>
              <em>Moteurs éteints quand pas en usage</em>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- SECTION 4: APRÈS LE TRAVAIL -->
    <div class="section" data-section="apres">
      <div class="section-header">
        <div class="section-title">
          <span class="emoji">✅</span>
          <span>APRÈS LE TRAVAIL</span>
        </div>
        <div class="section-icon">▼</div>
      </div>
      <div class="section-content">
        <div class="items">
          <label class="item">
            <input type="checkbox" class="item-check" data-id="apres-1">
            <div class="item-label">
              <strong>Photo APRÈS prise et envoyée</strong>
              <em>Même angle, même éclairage que photo AVANT</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="apres-2">
            <div class="item-label">
              <strong>Tour final avec le client</strong>
              <em>"Êtes-vous satisfait? C'est exactement ce que vous attendiez?"</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="apres-3">
            <div class="item-label">
              <strong>Client satisfait? (oui/non)</strong>
              <em>Résoudre tout problème immédiatement sur site</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="apres-4">
            <div class="item-label">
              <strong>Carte de satisfaction signée</strong>
              <em>Preuve de qualité, satisfaction confirmée</em>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- SECTION 5: UPSELLS -->
    <div class="section" data-section="upsells">
      <div class="section-header">
        <div class="section-title">
          <span class="emoji">💰</span>
          <span>UPSELLS (OBLIGATOIRE DE PROPOSER)</span>
        </div>
        <div class="section-icon">▼</div>
      </div>
      <div class="section-content">
        <div class="items">
          <label class="item">
            <input type="checkbox" class="item-check" data-id="upsell-1">
            <div class="item-label">
              <strong>Proposé : Lavage de vitres (+150$)</strong>
              <em>"Pendant qu'on est là, on pourrait laver les vitres?"</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="upsell-2">
            <div class="item-label">
              <strong>Proposé : Gouttières (+100$)</strong>
              <em>"Vos gouttières, c'est du nettoyage? Déneigement?"</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="upsell-3">
            <div class="item-label">
              <strong>Proposé : Engrais cèdres (+75-150$)</strong>
              <em>"Pour que vos cèdres restent verts toute l'année"</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="upsell-4">
            <div class="item-label">
              <strong>Client intéressé? → Noter quel service</strong>
              <em>Rajouter à la facture ou proposer pour la prochaine visite</em>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- SECTION 6: FIDÉLISATION -->
    <div class="section" data-section="fidelisation">
      <div class="section-header">
        <div class="section-title">
          <span class="emoji">⭐</span>
          <span>FIDÉLISATION</span>
        </div>
        <div class="section-icon">▼</div>
      </div>
      <div class="section-content">
        <div class="items">
          <label class="item">
            <input type="checkbox" class="item-check" data-id="fidel-1">
            <div class="item-label">
              <strong>Demandé avis Google 5 étoiles</strong>
              <em>"Vous pourriez laisser un avis 5 étoiles sur Google?"</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="fidel-2">
            <div class="item-label">
              <strong>Carte d'affaires remise</strong>
              <em>Au minimum une par client, avec logo Haie Lite</em>
            </div>
          </label>
          <label class="item">
            <input type="checkbox" class="item-check" data-id="fidel-3">
            <div class="item-label">
              <strong>Programme référence expliqué (50$ crédit)</strong>
              <em>"Vous référez quelqu'un, vous gagnez 50$ crédit"</em>
            </div>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-reset" id="resetBtn">Réinitialiser</button>
    <button class="btn btn-new-job" id="newJobBtn">✓ Nouveau Job</button>
  </div>

  <script>
    // LocalStorage keys
    const STORAGE_KEY = 'haie-lite-checklist';
    const JOBS_KEY = 'haie-lite-jobs-completed';

    // Data structure
    const checklist = {
      depart: [
        { id: 'depart-1' },
        { id: 'depart-2' },
        { id: 'depart-3' },
        { id: 'depart-4' },
        { id: 'depart-5' }
      ],
      arrivee: [
        { id: 'arrivee-1' },
        { id: 'arrivee-2' },
        { id: 'arrivee-3' },
        { id: 'arrivee-4' },
        { id: 'arrivee-5' }
      ],
      travail: [
        { id: 'travail-1' },
        { id: 'travail-2' },
        { id: 'travail-3' },
        { id: 'travail-4' }
      ],
      apres: [
        { id: 'apres-1' },
        { id: 'apres-2' },
        { id: 'apres-3' },
        { id: 'apres-4' }
      ],
      upsells: [
        { id: 'upsell-1' },
        { id: 'upsell-2' },
        { id: 'upsell-3' },
        { id: 'upsell-4' }
      ],
      fidelisation: [
        { id: 'fidel-1' },
        { id: 'fidel-2' },
        { id: 'fidel-3' }
      ]
    };

    function getTotalItems() {
      let count = 0;
      for (const section in checklist) {
        count += checklist[section].length;
      }
      return count;
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {};
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getJobCount() {
      const saved = localStorage.getItem(JOBS_KEY);
      return saved ? parseInt(saved) : 0;
    }

    function setJobCount(count) {
      localStorage.setItem(JOBS_KEY, count.toString());
    }

    function updateProgress() {
      const state = loadState();
      const total = getTotalItems();
      const checked = Object.keys(state).filter(k => state[k]).length;
      const percent = total > 0 ? Math.round((checked / total) * 100) : 0;

      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressText').textContent = checked + '/' + total + ' étapes';
      document.getElementById('progressPercent').textContent = percent + '%';
    }

    function updateSectionState(sectionName) {
      const state = loadState();
      const section = document.querySelector(`[data-section="${sectionName}"]`);
      const items = checklist[sectionName];
      const allChecked = items.every(item => state[item.id]);

      if (allChecked && items.length > 0) {
        section.classList.add('completed');
      } else {
        section.classList.remove('completed');
      }
    }

    function restoreCheckboxes() {
      const state = loadState();
      document.querySelectorAll('.item-check').forEach(checkbox => {
        checkbox.checked = state[checkbox.dataset.id] || false;
        checkbox.parentElement.classList.toggle('checked', checkbox.checked);
      });
    }

    function setupEventListeners() {
      // Checkbox change
      document.querySelectorAll('.item-check').forEach(checkbox => {
        checkbox.addEventListener('change', (e) => {
          const state = loadState();
          const id = e.target.dataset.id;
          state[id] = e.target.checked;
          saveState(state);

          e.target.parentElement.classList.toggle('checked', e.target.checked);

          // Get section from id (before first dash)
          const sectionName = id.split('-')[0];
          updateSectionState(sectionName);
          updateProgress();

          // Vibration feedback
          if (navigator.vibrate) {
            navigator.vibrate(50);
          }
        });

        // Click on label to toggle
        checkbox.parentElement.addEventListener('click', (e) => {
          if (e.target !== checkbox && e.target.tagName !== 'A') {
            checkbox.click();
          }
        });
      });

      // Section header collapse/expand
      document.querySelectorAll('.section-header').forEach(header => {
        header.addEventListener('click', () => {
          const section = header.parentElement;
          section.classList.toggle('collapsed');
        });
      });

      // Reset button
      document.getElementById('resetBtn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        document.querySelectorAll('.item-check').forEach(checkbox => {
          checkbox.checked = false;
          checkbox.parentElement.classList.remove('checked');
        });
        document.querySelectorAll('.section').forEach(s => s.classList.remove('completed'));
        updateProgress();
        showToast('Checklist réinitialisée');
      });

      // New job button
      document.getElementById('newJobBtn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        const jobCount = getJobCount() + 1;
        setJobCount(jobCount);
        document.getElementById('jobCount').textContent = jobCount;
        document.querySelectorAll('.item-check').forEach(checkbox => {
          checkbox.checked = false;
          checkbox.parentElement.classList.remove('checked');
        });
        document.querySelectorAll('.section').forEach(s => s.classList.remove('completed'));
        updateProgress();
        showToast('✓ Nouveau job — Bonne chance!');
      });
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }

    function init() {
      // Update job counter
      document.getElementById('jobCount').textContent = getJobCount();

      // Restore checkbox state
      restoreCheckboxes();

      // Update all section states
      Object.keys(checklist).forEach(section => updateSectionState(section));

      // Update progress
      updateProgress();

      // Setup listeners
      setupEventListeners();
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
